<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Entity Encoder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tool-mono { font-family: 'JetBrains Mono', monospace; }

        .tool-stack { display: grid; gap: var(--crusher-spacing-6); max-width: 42rem; margin-inline: auto; }
        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-4); }
        .tool-label { display: block; margin-bottom: var(--crusher-spacing-1); font-size: var(--crusher-font-size-sm); color: var(--crusher-text-secondary); }
        .tool-action-row { display: flex; flex-wrap: wrap; justify-content: center; gap: var(--crusher-spacing-4); }
        .tool-action { padding-inline: var(--crusher-spacing-6); padding-block: var(--crusher-spacing-2); border-radius: var(--crusher-radius-full); font-weight: 600; }
        textarea.crusher-tool-control { min-block-size: 6rem; padding: var(--crusher-spacing-3); }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">HTML Entity Encoder</h1>
            <p class="crusher-tool-lede">Encode special characters to HTML entities.</p>
        </header>

        <div class="tool-stack">
            <section class="crusher-tool-surface tool-section">
                <div>
                    <label for="input" class="tool-label">Input Text</label>
                    <textarea id="input" rows="4" class="crusher-tool-control tool-mono" placeholder="Enter text..."></textarea>
                </div>
                <div class="tool-action-row">
                    <button id="encode-btn" type="button" class="crusher-tool-action tool-action">Encode</button>
                    <button id="decode-btn" type="button" class="crusher-tool-action tool-action">Decode</button>
                </div>
                <div>
                    <label for="output" class="tool-label">Output</label>
                    <textarea id="output" rows="4" readonly class="crusher-tool-control tool-mono"></textarea>
                </div>
            </section>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js"></script>

    <script>
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
        const rmap = Object.fromEntries(Object.entries(map).map(([k, v]) => [v, k]));

        document.getElementById('encode-btn').addEventListener('click', () => {
            const txt = document.getElementById('input').value;
            let res = '';
            for (const char of txt) res += map[char] || char;
            document.getElementById('output').value = res;
        });

        document.getElementById('decode-btn').addEventListener('click', () => {
            let txt = document.getElementById('input').value;
            for (const [k, v] of Object.entries(rmap)) txt = txt.split(k).join(v);
            document.getElementById('output').value = txt;
        });
    </script>
</body>
</html>
